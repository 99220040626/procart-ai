# --- DATABASE CONFIGURATION (MASTER & REPLICA) ---
spring.datasource.master.jdbc-url=${DB_URL}
spring.datasource.master.username=${DB_USER}
spring.datasource.master.password=${DB_PASSWORD}
spring.datasource.master.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.replica.jdbc-url=${DB_URL}
spring.datasource.replica.username=${DB_USER}
spring.datasource.replica.password=${DB_PASSWORD}
spring.datasource.replica.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_batch_fetch_size=1000

server.port=${SERVER_PORT:8080}

# --- FILE UPLOADS (Up to 50MB) ---
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# --- GMAIL SMTP CONFIGURATION FOR RECEIPTS ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- REDIS CACHE CONFIGURATION ---
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# --- PYTHON AI gRPC CONFIGURATION ---
grpc.client.fraudService.address=${FRAUD_SERVICE_URL:static://127.0.0.1:50051}
grpc.client.fraudService.negotiationType=plaintext

# --- GROQ AI KEY ---
groq.api.key=${GROQ_API_KEY}

# --- GRAPHQL CONFIGURATION ---
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql
spring.graphql.path=/graphql

# --- DISTRIBUTED TRACING & SECURITY ---
spring.application.name=procart-backend
management.tracing.enabled=false
jwt.secret=${JWT_SECRET_KEY}
cors.allowed-origins=${CORS_ORIGINS:https://procart-ai-nine.vercel.app,http://10.2.6.74:3000}

# ====================================================
# 🐒 CHAOS MONKEY SETTINGS 🐒
# ====================================================
management.endpoint.chaosmonkey.enabled=true
management.endpoints.web.exposure.include=health,info,chaosmonkey
chaos.monkey.enabled=false
chaos.monkey.watcher.rest-controller=true
chaos.monkey.watcher.repository=true
chaos.monkey.assaults.level=3
chaos.monkey.assaults.latency-active=true
chaos.monkey.assaults.latency-range-start=2000
chaos.monkey.assaults.latency-range-end=5000
chaos.monkey.assaults.exceptions-active=true

# ====================================================
# 🌩️ KUBERNETES AUTO-SCALING PROBES 🌩️
# ====================================================
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ====================================================
# 🛡️ HIKARICP DATABASE CONNECTION POOL TUNING
# ====================================================
# Allows up to 50 concurrent database connections per server instance
spring.datasource.hikari.maximum-pool-size=50
# Keeps 10 connections open and waiting for immediate use
spring.datasource.hikari.minimum-idle=10
# How long to wait for a connection before failing (20 seconds)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ====================================================
# 🚀 100,000CR ADDED FEATURES (NO LINES REMOVED) 🚀
# ====================================================
# 1. Java 21 Virtual Threads (10k users/sec)
spring.threads.virtual.enabled=true
# 2. Aggressive Resource Caching (Millimillisecond loads)
spring.web.resources.cache.period=31536000
spring.web.resources.chain.cache=true